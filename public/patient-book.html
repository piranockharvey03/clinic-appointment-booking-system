    <script>
        feather.replace();
        
        // Handle form submission with loading state
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = document.getElementById('confirmBookingBtn');
            const spinner = document.getElementById('bookingSpinner');
            const checkIcon = document.getElementById('bookingCheckIcon');
            const text = document.getElementById('bookingText');
            
            // Check if form is valid
            if (!this.checkValidity()) {
                return;
            }
            
            // Disable button and show spinner
            btn.disabled = true;
            spinner.classList.remove('hidden');
            checkIcon.style.display = 'none';
            text.textContent = 'Booking...';
        });
        
        // Display error messages from URL
        window.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const error = urlParams.get('error');
            
            if (error) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'bg-red-50 border-l-4 border-red-400 p-4 mb-6 rounded animate-pulse';
                errorDiv.innerHTML = `
                    <div class="flex">
                        <div class="flex-shrink-0">
                            <svg class="h-5 w-5 text-red-400" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="ml-3">
                            <p class="text-sm font-medium text-red-800">${decodeURIComponent(error)}</p>
                        </div>
                        <button onclick="this.parentElement.parentElement.remove()" class="ml-auto text-red-400 hover:text-red-600">
                            <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                            </svg>
                        </button>
                    </div>
                `;
                
                // Insert error at the top of the form container
                const formContainer = document.querySelector('form');
                formContainer.insertBefore(errorDiv, formContainer.firstChild);
                
                // Remove error from URL
                window.history.replaceState({}, document.title, window.location.pathname);
                
                // Auto-remove after 8 seconds
                setTimeout(() => {
                    if (errorDiv.parentNode) {
                        errorDiv.style.transition = 'opacity 0.5s';
                        errorDiv.style.opacity = '0';
                        setTimeout(() => errorDiv.remove(), 500);
                    }
                }, 8000);
            }
        });
    </script>
</body>

</html>
